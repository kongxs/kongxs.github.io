    <h1 class="posttitle" itemprop="name headline">
        忘记ide、命令行
    </h1>



    <div class="meta">
      <span class="author" itemprop="author" itemscope itemtype="http://schema.org/Person">
        <span itemprop="name">师学</span>
      </span>
      
    <div class="postdate">
      
        <time datetime="2020-05-08T05:59:00.000Z" itemprop="datePublished">2020-05-08</time>
        
      
    </div>


      
    <div class="article-category">
        <i class="fas fa-archive"></i>
        <a class="category-link" href="/categories/Android/">Android</a>
    </div>


      

    </div>
  </header>
  

  <div class="content" itemprop="articleBody">
    <p>IDE提高生产效率，一些基础的命令还是要牢记的。 </p>
<span id="more"></span>

<ol>
<li>class2jar</li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">1. jar -cvf result.jar classPath 生成jar包</span><br><span class="line"></span><br><span class="line">2. jar umf MANIFEST.MF hello.jar 更新清单，可以指定入口类，生成可执行jar包</span><br><span class="line">	Manifest-Version: 1.0</span><br><span class="line">	Main-Class: xxxx.class</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<ol start="2">
<li>jar2dex </li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">dx --dex --output result.dex source.jar </span><br></pre></td></tr></table></figure>

<ol start="3">
<li>zipalign apk对齐</li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">zipalign -v -p 4 source.apk aligned.apk</span><br><span class="line"></span><br><span class="line">4字节  也就是32位对齐</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<ol start="4">
<li>apksigner 签名 </li>
</ol>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">apksigner sign --ks xxx.jks --ks-key-alias 123 --ks-pass pass:123456 --key-pass pass:123456 --out signed.apk unsigned.apk</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">--ks 你的jks路径                                 //jks签名证书路径</span><br><span class="line">--ks-key-alias 你的alias           //生成jks时指定的alias</span><br><span class="line">--ks-pass pass:你的密码          //KeyStore密码</span><br><span class="line">--key-pass pass:你的密码   //签署者的密码，即生成jks时指定alias对应的密码</span><br><span class="line">--out output.apk                         //输出路径</span><br><span class="line">input.apk                                     //被签名的apk</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
  </div>
</article>
